openapi: 3.1.0
info:
  title: Api
  version: 0.3.0
  description: Receita da Boa - Social Recipe Network API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: receitas
  - name: categorias
  - name: favoritos
  - name: likes
  - name: follows
  - name: comentarios
  - name: reports
  - name: admin
  - name: usuarios

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:
                  type: string
                  nullable: true
                nome:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /receitas:
    get:
      operationId: getReceitas
      tags: [receitas]
      parameters:
        - name: feed
          in: query
          schema:
            type: string
            enum: [recentes, seguindo, populares]
        - name: search
          in: query
          schema:
            type: string
        - name: categoriaId
          in: query
          schema:
            type: integer
        - name: autorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receita"
    post:
      operationId: createReceita
      tags: [receitas]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceitaInput"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"

  /receitas/{id}:
    get:
      operationId: getReceita
      tags: [receitas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateReceita
      tags: [receitas]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceitaInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"
    delete:
      operationId: deleteReceita
      tags: [receitas]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /categorias:
    get:
      operationId: getCategorias
      tags: [categorias]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
    post:
      operationId: createCategoria
      tags: [categorias]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoriaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"

  /favoritos:
    get:
      operationId: getFavoritos
      tags: [favoritos]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Favorited recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receita"
    post:
      operationId: addFavorito
      tags: [favoritos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoritoInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /favoritos/{receitaId}:
    delete:
      operationId: removeFavorito
      tags: [favoritos]
      security:
        - bearerAuth: []
      parameters:
        - name: receitaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /likes/{receitaId}:
    post:
      operationId: likeReceita
      tags: [likes]
      security:
        - bearerAuth: []
      parameters:
        - name: receitaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"

  /follows/{userId}:
    post:
      operationId: followUser
      tags: [follows]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Follow toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResponse"

  /comentarios/{receitaId}:
    get:
      operationId: getComentarios
      tags: [comentarios]
      summary: Get comments for a recipe
      parameters:
        - name: receitaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comentario"
    post:
      operationId: createComentario
      tags: [comentarios]
      summary: Post a comment
      security:
        - bearerAuth: []
      parameters:
        - name: receitaId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComentarioInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comentario"

  /comentarios/{id}/delete:
    post:
      operationId: deleteComentario
      tags: [comentarios]
      summary: Delete own comment (or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /reports:
    post:
      operationId: reportContent
      tags: [reports]
      summary: Report a recipe or a comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/reports:
    get:
      operationId: getAdminReports
      tags: [admin]
      summary: Get all reported recipes (ADM only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reported recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportedReceita"

  /admin/reports/comentarios:
    get:
      operationId: getAdminComentarioReports
      tags: [admin]
      summary: Get all reported comments (ADM only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reported comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportedComentario"

  /admin/receitas/{id}:
    delete:
      operationId: adminDeleteReceita
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/comentarios/{id}:
    delete:
      operationId: adminDeleteComentario
      tags: [admin]
      summary: Admin delete any comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/usuarios/{id}/ban:
    post:
      operationId: banUsuario
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /usuarios/{id}:
    get:
      operationId: getUsuario
      tags: [usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likeCount:
          type: integer
      required: [liked, likeCount]

    FollowResponse:
      type: object
      properties:
        following:
          type: boolean
      required: [following]

    User:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        papel:
          type: string
          enum: [usuario, adm]
        isBanned:
          type: boolean
        photoUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
      required: [id, nome, email, papel, isBanned]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        papel:
          type: string
          enum: [usuario, adm]
        isBanned:
          type: boolean
        photoUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        followersCount:
          type: integer
        followingCount:
          type: integer
        receitasCount:
          type: integer
        isFollowing:
          type: boolean
      required: [id, nome, email, papel, isBanned, followersCount, followingCount, receitasCount, isFollowing]

    Categoria:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
      required: [id, nome]

    Receita:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: string
        ingredientes:
          type: string
        instrucoes:
          type: string
        urlImagem:
          type: string
          nullable: true
        categoriaId:
          type: integer
          nullable: true
        autorId:
          type: integer
        isReported:
          type: boolean
        likeCount:
          type: integer
        isLiked:
          type: boolean
        isFavorited:
          type: boolean
        categoria:
          $ref: "#/components/schemas/Categoria"
          nullable: true
        autor:
          $ref: "#/components/schemas/User"
          nullable: true
        createdAt:
          type: string
      required: [id, titulo, descricao, ingredientes, instrucoes, autorId, isReported, likeCount, isLiked, isFavorited, createdAt]

    Comentario:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        receitaId:
          type: integer
        texto:
          type: string
        isReported:
          type: boolean
        createdAt:
          type: string
        autor:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [id, userId, receitaId, texto, isReported, createdAt]

    ReportEntry:
      type: object
      properties:
        id:
          type: integer
        motivo:
          type: string
        userId:
          type: integer
        createdAt:
          type: string
        denunciante:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [id, motivo, userId, createdAt]

    ReportedReceita:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: string
        ingredientes:
          type: string
        instrucoes:
          type: string
        urlImagem:
          type: string
          nullable: true
        autorId:
          type: integer
        isReported:
          type: boolean
        reportCount:
          type: integer
        likeCount:
          type: integer
        isLiked:
          type: boolean
        isFavorited:
          type: boolean
        createdAt:
          type: string
        autor:
          $ref: "#/components/schemas/User"
          nullable: true
        categoria:
          $ref: "#/components/schemas/Categoria"
          nullable: true
        reports:
          type: array
          items:
            $ref: "#/components/schemas/ReportEntry"
      required: [id, titulo, autorId, isReported, reportCount, reports]

    ReportedComentario:
      type: object
      properties:
        id:
          type: integer
        texto:
          type: string
        userId:
          type: integer
        receitaId:
          type: integer
        isReported:
          type: boolean
        reportCount:
          type: integer
        createdAt:
          type: string
        autor:
          $ref: "#/components/schemas/User"
          nullable: true
        receita:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            titulo:
              type: string
        reports:
          type: array
          items:
            $ref: "#/components/schemas/ReportEntry"
      required: [id, texto, userId, receitaId, isReported, reportCount, reports]

    CreateReceitaInput:
      type: object
      properties:
        titulo:
          type: string
        descricao:
          type: string
        ingredientes:
          type: string
        instrucoes:
          type: string
        urlImagem:
          type: string
          nullable: true
        categoriaId:
          type: integer
          nullable: true
      required: [titulo, descricao, ingredientes, instrucoes]

    CreateCategoriaInput:
      type: object
      properties:
        nome:
          type: string
      required: [nome]

    FavoritoInput:
      type: object
      properties:
        receitaId:
          type: integer
      required: [receitaId]

    CreateComentarioInput:
      type: object
      properties:
        texto:
          type: string
      required: [texto]

    ReportInput:
      type: object
      properties:
        receitaId:
          type: integer
          nullable: true
        comentarioId:
          type: integer
          nullable: true
        motivo:
          type: string
      required: [motivo]
